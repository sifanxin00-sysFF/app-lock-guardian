<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>家长端 App 首页</title>
  <script>
    (function () {
      var key = "parentAppTheme";
      var valid = { blue: true, green: true, warm: true, slate: true };
      var theme = "";
      try {
        theme = new URLSearchParams(window.location.search).get("theme") || "";
      } catch (error) {}
      if (!valid[theme]) {
        try {
          theme = localStorage.getItem(key) || "";
        } catch (error) {}
      }
      if (!valid[theme] && window.name && window.name.indexOf(key + "=") === 0) {
        theme = window.name.slice(key.length + 1);
      }
      if (!valid[theme]) {
        var cookie = document.cookie.split("; ").find(function (item) {
          return item.indexOf(key + "=") === 0;
        });
        theme = cookie ? decodeURIComponent(cookie.split("=")[1] || "") : "";
      }
      document.documentElement.dataset.theme = valid[theme] ? theme : "blue";
    })();
  </script>
  <style>
    :root {
      --bg: oklch(97% 0.008 245);
      --surface: oklch(100% 0 0);
      --surface-soft: oklch(95% 0.018 245);
      --fg: oklch(20% 0.014 250);
      --muted: oklch(54% 0.015 250);
      --border: oklch(90% 0.01 245);
      --accent: oklch(63% 0.12 240);
      --accent-deep: oklch(48% 0.13 242);
      --green: oklch(63% 0.13 155);
      --amber: oklch(74% 0.13 75);
      --danger: oklch(58% 0.16 28);
      --shadow: 0 18px 44px oklch(50% 0.04 245 / 0.13);
      --soft-shadow: 0 10px 26px oklch(45% 0.035 245 / 0.09);
      --radius-lg: 26px;
      --radius-md: 20px;
      --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% -10%, oklch(88% 0.045 235 / 0.65), transparent 34rem),
        linear-gradient(180deg, oklch(98% 0.004 245), oklch(93% 0.012 245));
      color: var(--fg);
      font-family: var(--font-body);
    }

    button, a { -webkit-tap-highlight-color: transparent; }
    button { font: inherit; cursor: pointer; }

    .phone {
      inline-size: min(412px, 100vw);
      block-size: min(900px, 100vh);
      background: var(--bg);
      border: 1px solid oklch(84% 0.012 245);
      border-radius: 34px;
      overflow: hidden;
      box-shadow: 0 30px 90px oklch(32% 0.04 250 / 0.23);
      position: relative;
    }

    .screen {
      block-size: 100%;
      overflow-y: auto;
      padding: 16px 18px 104px;
      scrollbar-width: none;
    }

    .screen::-webkit-scrollbar { display: none; }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      block-size: 28px;
      padding-inline: 6px;
      color: oklch(28% 0.014 250);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .status-icons { display: flex; align-items: center; gap: 6px; }
    .signal, .battery { display: inline-block; border: 1.6px solid currentColor; }
    .signal { inline-size: 16px; block-size: 10px; border-block-start: 0; border-inline-start: 0; transform: skewX(-10deg); }
    .battery { inline-size: 21px; block-size: 10px; border-radius: 3px; position: relative; }
    .battery::after { content: ""; position: absolute; inset-block-start: 2px; inset-inline-end: -4px; inline-size: 2px; block-size: 4px; border-radius: 2px; background: currentColor; }
    .battery::before { content: ""; position: absolute; inset: 2px 6px 2px 2px; border-radius: 1px; background: currentColor; }

    .page { display: block; }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding-block: 10px 14px;
    }

    .greeting {
      margin: 0;
      font-family: var(--font-display);
      font-size: 25px;
      line-height: 1.18;
      letter-spacing: 0;
      font-weight: 780;
    }

    .page-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 26px;
      line-height: 1.15;
      font-weight: 820;
    }

    .subtle { margin: 7px 0 0; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .online-dot { display: inline-block; inline-size: 8px; block-size: 8px; border-radius: 999px; margin-inline-end: 6px; background: var(--green); box-shadow: 0 0 0 4px oklch(78% 0.09 155 / 0.22); vertical-align: 0; }

    .icon-actions { display: flex; gap: 8px; padding-block-start: 2px; }
    .icon-btn {
      inline-size: 44px;
      block-size: 44px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: oklch(100% 0 0 / 0.86);
      color: var(--fg);
      box-shadow: var(--soft-shadow);
    }

    .icon {
      inline-size: 20px;
      block-size: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .device-card {
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      padding: 22px;
      background:
        radial-gradient(circle at 88% 12%, oklch(79% 0.08 230 / 0.55), transparent 9rem),
        linear-gradient(145deg, oklch(99% 0.003 245), oklch(92% 0.026 238));
      border: 1px solid oklch(88% 0.02 240);
      box-shadow: var(--shadow);
    }

    .device-card::after {
      content: "";
      position: absolute;
      inset-inline-end: -22px;
      inset-block-end: -34px;
      inline-size: 150px;
      block-size: 150px;
      border: 18px solid oklch(71% 0.08 238 / 0.2);
      border-radius: 999px;
    }

    .card-head, .row-between { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; }
    .card-head { position: relative; z-index: 1; }
    .child-name { margin: 0; font-size: 19px; line-height: 1.25; font-weight: 760; }
    .device-card .child-name { font-size: 29px; line-height: 1.08; font-weight: 850; letter-spacing: 0; }
    .device-name { margin: 6px 0 0; color: var(--muted); font-size: 13px; }

    .badge, .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-block-size: 32px;
      padding-inline: 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .badge { color: oklch(24% 0.055 238); background: oklch(90% 0.055 235); }
    .pill { color: var(--accent-deep); background: oklch(93% 0.036 238); }
    .pill.green { color: oklch(32% 0.09 155); background: oklch(92% 0.045 155); }
    .pill.amber { color: oklch(42% 0.11 72); background: oklch(94% 0.055 75); }

    .device-metrics { display: grid; grid-template-columns: 1.15fr 1fr; gap: 12px; margin-block-start: 22px; position: relative; z-index: 1; }
    .metric-soft { min-block-size: 80px; padding: 15px; border-radius: 22px; background: oklch(100% 0 0 / 0.7); border: 1px solid oklch(100% 0 0 / 0.7); backdrop-filter: blur(10px); }
    .metric-label { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.35; }
    .metric-value { margin: 7px 0 0; font-size: 23px; line-height: 1; font-weight: 820; letter-spacing: 0; font-variant-numeric: tabular-nums; }

    .section { margin-block-start: 18px; }
    .section-title { display: flex; align-items: center; justify-content: space-between; margin-block-end: 10px; }
    .section-title h2 { margin: 0; font-size: 17px; line-height: 1.25; font-weight: 780; letter-spacing: 0; }
    .section-title a { color: var(--accent-deep); text-decoration: none; font-size: 13px; font-weight: 700; }

    .overview { display: grid; grid-template-columns: 126px 1fr; gap: 12px; align-items: stretch; }
    .card, .ring-card, .mini-stats, .request-card, .usage-card, .quick-card, .setting-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--soft-shadow);
    }

    .card { padding: 16px; }
    .ring-card { min-block-size: 144px; padding: 16px 12px; display: grid; place-items: center; text-align: center; }
    .ring { --p: 68%; inline-size: 88px; block-size: 88px; display: grid; place-items: center; border-radius: 999px; background: conic-gradient(var(--accent) var(--p), oklch(91% 0.014 245) 0); position: relative; }
    .ring::before { content: ""; position: absolute; inset: 9px; border-radius: inherit; background: var(--surface); }
    .ring span { position: relative; font-size: 20px; font-weight: 850; font-variant-numeric: tabular-nums; }
    .ring-caption { margin: 10px 0 0; color: var(--muted); font-size: 12px; }
    .mini-stats { padding: 10px 14px; display: grid; gap: 8px; }
    .stat-line { display: flex; justify-content: space-between; align-items: center; gap: 12px; min-block-size: 36px; border-block-end: 1px solid var(--border); }
    .stat-line:last-child { border-block-end: 0; }
    .stat-line span { color: var(--muted); font-size: 12px; }
    .stat-line strong { font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums; }

    .approval {
      padding: 15px;
      border-radius: 28px;
      background: linear-gradient(180deg, oklch(99% 0.004 245), oklch(95% 0.02 238));
      border: 1px solid oklch(88% 0.024 240);
      box-shadow: var(--shadow);
    }

    .request-card { padding: 14px; border-radius: 22px; box-shadow: none; }
    .request-card + .request-card, .list-gap > * + * { margin-block-start: 10px; }
    .request-top { display: flex; align-items: flex-start; gap: 10px; }
    .app-mark { flex: 0 0 auto; inline-size: 42px; block-size: 42px; display: grid; place-items: center; border-radius: 15px; background: oklch(93% 0.035 238); color: var(--accent-deep); font-weight: 840; font-size: 15px; }
    .request-title { margin: 0; font-size: 15px; font-weight: 780; line-height: 1.38; }
    .request-meta { margin: 4px 0 0; color: var(--muted); font-size: 12px; line-height: 1.35; }
    .request-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-block-start: 13px; }
    .btn { min-block-size: 46px; border: 0; border-radius: 16px; font-size: 15px; font-weight: 780; }
    .btn-approve { color: white; background: linear-gradient(180deg, var(--accent), var(--accent-deep)); box-shadow: 0 10px 22px oklch(50% 0.11 240 / 0.24); }
    .btn-reject { color: var(--fg); background: oklch(95% 0.008 245); border: 1px solid var(--border); }

    .usage-card { padding: 15px; }
    .usage-row { display: grid; grid-template-columns: 42px 1fr auto; gap: 10px; align-items: center; min-block-size: 50px; }
    .usage-row + .usage-row { border-block-start: 1px solid var(--border); }
    .app-icon { inline-size: 32px; block-size: 32px; border-radius: 12px; display: grid; place-items: center; font-size: 13px; font-weight: 820; color: oklch(26% 0.02 250); background: var(--surface-soft); }
    .usage-name { margin: 0 0 6px; font-size: 14px; font-weight: 730; }
    .bar { block-size: 7px; border-radius: 999px; background: oklch(92% 0.01 245); overflow: hidden; }
    .bar i { display: block; block-size: 100%; border-radius: inherit; background: var(--accent); }
    .usage-time { color: var(--muted); font-size: 12px; font-weight: 720; font-variant-numeric: tabular-nums; }

    .quick-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .quick-card { min-block-size: 86px; padding: 14px; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: space-between; color: var(--fg); text-align: start; }
    .quick-card svg { color: var(--accent-deep); }
    .quick-card strong { font-size: 14px; line-height: 1.3; }
    .quick-card span { color: var(--muted); font-size: 12px; }

    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .summary-tile { min-block-size: 88px; padding: 13px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); box-shadow: var(--soft-shadow); }
    .summary-tile span { color: var(--muted); font-size: 12px; }
    .summary-tile strong { display: block; margin-block-start: 8px; font-size: 22px; font-weight: 850; font-variant-numeric: tabular-nums; }

    .rule-card { padding: 16px; border-radius: 24px; background: var(--surface); border: 1px solid var(--border); box-shadow: var(--soft-shadow); }
    .rule-card + .rule-card { margin-block-start: 10px; }
    .switch { inline-size: 50px; block-size: 30px; border-radius: 999px; background: oklch(88% 0.012 245); padding: 3px; border: 0; }
    .switch::before { content: ""; display: block; inline-size: 24px; block-size: 24px; border-radius: 999px; background: white; box-shadow: 0 2px 8px oklch(35% 0.02 245 / 0.18); }
    .switch.on { background: var(--accent); }
    .switch.on::before { transform: translateX(20px); }

    .trend { min-block-size: 150px; display: flex; align-items: end; gap: 10px; padding-block-start: 12px; }
    .trend-bar { flex: 1; border-radius: 999px 999px 8px 8px; background: linear-gradient(180deg, oklch(70% 0.095 238), oklch(55% 0.12 240)); min-block-size: 34px; }
    .profile-card { padding: 18px; border-radius: 28px; background: linear-gradient(145deg, white, oklch(94% 0.02 238)); border: 1px solid var(--border); box-shadow: var(--shadow); display: flex; gap: 14px; align-items: center; }
    .avatar { inline-size: 58px; block-size: 58px; display: grid; place-items: center; border-radius: 22px; background: oklch(90% 0.055 235); color: var(--accent-deep); font-size: 22px; font-weight: 850; }
    .menu-row { min-block-size: 54px; display: flex; align-items: center; justify-content: space-between; border-block-end: 1px solid var(--border); color: var(--fg); font-weight: 720; }
    .menu-row:last-child { border-block-end: 0; }

    .nav {
      position: absolute;
      inset-inline: 0;
      inset-block-end: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2px;
      padding: 8px 12px 12px;
      border: 0;
      border-block-start: 1px solid oklch(88% 0.012 245 / 0.85);
      border-radius: 24px 24px 0 0;
      background: oklch(100% 0 0 / 0.9);
      box-shadow: 0 -14px 34px oklch(35% 0.03 245 / 0.13);
      backdrop-filter: blur(18px);
    }

    .nav-item {
      min-block-size: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border: 0;
      border-radius: 18px;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 720;
      text-decoration: none;
    }

    .nav-item.active { color: var(--accent-deep); background: oklch(93% 0.036 238); }
    .nav-item .icon { inline-size: 19px; block-size: 19px; }

    @media (max-width: 430px) {
      body { display: block; background: var(--bg); }
      .phone { inline-size: 100vw; block-size: 100vh; border: 0; border-radius: 0; box-shadow: none; }
    }
    /* Final home-only hero tuning: normal top safe area + cleaner floating ring. */
    .phone {
      background:
        radial-gradient(circle at 50% 30%, oklch(100% 0 0 / 0.9), transparent 13.5rem),
        radial-gradient(circle at 50% 35%, oklch(86% 0.046 244 / 0.34), transparent 17rem),
        linear-gradient(180deg, oklch(98.5% 0.007 235), oklch(93.5% 0.014 244));
    }

    .screen {
      padding-block-start: 24px;
      padding-block-end: 128px;
    }

    [data-page="home"] .top {
      align-items: center;
      padding-block: 16px 18px;
      min-block-size: 82px;
    }

    [data-page="home"] .greeting {
      font-size: 23px;
      line-height: 1.22;
      font-weight: 820;
      white-space: nowrap;
    }

    [data-page="home"] .subtle {
      margin-block-start: 8px;
      font-size: 13px;
      color: oklch(48% 0.018 248);
    }

    [data-page="home"] .icon-actions {
      align-items: center;
      padding-block-start: 0;
      gap: 9px;
    }

    [data-page="home"] .icon-btn {
      inline-size: 40px;
      block-size: 40px;
      border-radius: 15px;
      background:
        linear-gradient(180deg, oklch(100% 0 0 / 0.92), oklch(97% 0.012 244 / 0.78));
      border-color: oklch(100% 0 0 / 0.9);
      box-shadow:
        0 8px 18px oklch(43% 0.035 245 / 0.085),
        inset 0 1px 0 oklch(100% 0 0 / 0.95);
    }

    [data-page="home"] [data-od-id="today-overview"] {
      margin-block-start: 4px;
    }

    [data-page="home"] [data-od-id="today-overview"]::before {
      inset-inline: -18px;
      inset-block-start: -24px;
      block-size: 390px;
      background:
        radial-gradient(circle at 50% 42%, oklch(100% 0 0 / 0.74), transparent 9.8rem),
        radial-gradient(circle at 50% 45%, oklch(80% 0.08 255 / 0.13), transparent 16.5rem);
      filter: none;
      opacity: 1;
    }

    [data-page="home"] [data-od-id="today-overview"] .section-title {
      justify-content: center;
      margin-block-end: -4px;
    }

    [data-page="home"] [data-od-id="today-overview"] .section-title h2 {
      font-size: 11px;
      line-height: 1;
      font-weight: 640;
      color: oklch(58% 0.014 248);
      letter-spacing: 0;
    }

    [data-page="home"] .featured-ring.dashboard-ring {
      min-block-size: 424px;
      padding: 6px 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    [data-page="home"] .featured-ring.dashboard-ring::before {
      inset-block-start: 20px;
      inline-size: 352px;
      block-size: 352px;
      background:
        radial-gradient(circle at 50% 48%, oklch(100% 0 0 / 0.64), transparent 7.8rem),
        radial-gradient(circle at 50% 50%, oklch(74% 0.105 262 / 0.13), transparent 57%);
      filter: blur(18px);
      opacity: 0.78;
    }

    [data-page="home"] .featured-ring.dashboard-ring::after {
      display: none;
    }

    [data-page="home"] .featured-ring.dashboard-ring .ring {
      inline-size: 322px;
      block-size: 322px;
      margin-block-start: 8px;
      background:
        conic-gradient(from 218deg,
          oklch(76% 0.135 287) 0 17%,
          oklch(71% 0.132 260) 17% 40%,
          oklch(72% 0.12 232) 40% 68%,
          oklch(95% 0.013 246 / 0.86) 68% 100%);
      box-shadow:
        0 24px 58px oklch(43% 0.048 252 / 0.13),
        0 0 32px oklch(74% 0.105 262 / 0.15),
        inset 0 3px 10px oklch(100% 0 0 / 0.95),
        inset 0 -24px 38px oklch(40% 0.052 264 / 0.075);
    }

    [data-page="home"] .featured-ring.dashboard-ring .ring::before {
      inset: 34px;
      background:
        radial-gradient(circle at 50% 18%, oklch(100% 0 0 / 0.98), oklch(99% 0.006 246) 42%, oklch(95% 0.018 252) 100%);
      box-shadow:
        inset 0 16px 30px oklch(100% 0 0 / 0.94),
        inset 0 -18px 32px oklch(48% 0.052 260 / 0.075),
        0 0 0 1px oklch(100% 0 0 / 0.76);
    }

    [data-page="home"] .featured-ring.dashboard-ring .ring::after {
      display: none;
    }

    [data-page="home"] .featured-ring.dashboard-ring .ring span {
      transform: translateY(3px);
      font-size: 64px;
      font-weight: 910;
      color: oklch(19% 0.022 254);
      text-shadow:
        0 8px 20px oklch(45% 0.06 252 / 0.1),
        0 1px 0 oklch(100% 0 0 / 0.86);
    }

    [data-page="home"] .featured-ring.dashboard-ring .ring span::before {
      display: none;
    }

    [data-page="home"] .featured-ring.dashboard-ring .ring-caption {
      margin-block-start: 20px;
      color: oklch(48% 0.032 248);
      font-size: 14px;
      font-weight: 720;
    }

    [data-page="home"] .dashboard-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      inline-size: 100%;
      margin-block-start: 36px;
      padding-inline: 22px;
    }

    [data-page="home"] .dashboard-stats .stat-line {
      min-block-size: 52px;
      padding: 8px 8px;
      border-radius: 18px;
      background: oklch(100% 0 0 / 0.62);
      border: 1px solid oklch(100% 0 0 / 0.7);
      box-shadow:
        0 6px 14px oklch(42% 0.03 245 / 0.034),
        inset 0 1px 0 oklch(100% 0 0 / 0.82);
    }

    [data-page="home"] .dashboard-stats .stat-line strong {
      font-size: 16.5px;
      font-weight: 830;
      color: oklch(23% 0.024 252);
    }

    [data-page="home"] .dashboard-stats .stat-line span {
      font-size: 10.5px;
      font-weight: 620;
      color: oklch(56% 0.016 248);
    }

    [data-page="home"] [data-od-id="device-status-card"] {
      margin-block-start: 6px;
      padding: 12px 13px;
      border-radius: 24px;
      background:
        radial-gradient(circle at 94% 0%, oklch(89% 0.052 238 / 0.18), transparent 7rem),
        linear-gradient(145deg, oklch(100% 0 0 / 0.72), oklch(97.5% 0.01 242 / 0.62));
      border-color: oklch(100% 0 0 / 0.66);
      box-shadow:
        0 9px 22px oklch(42% 0.028 245 / 0.048),
        inset 0 1px 0 oklch(100% 0 0 / 0.8);
    }

    [data-page="home"] [data-od-id="device-status-card"]::after {
      opacity: 0.12;
      border-width: 12px;
    }

    [data-page="home"] [data-od-id="device-status-card"] .child-name {

              <span class="stat-icon time"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8"/><path d="M12 7.5v5l3.4 2"/></svg></span>
              <span>今日剩余</span>
              <strong>1h25m</strong>
            </article>
            <article class="hero-stat-card">
              <span class="stat-icon unlock"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="10" width="12" height="9" rx="2"/><path d="M8 10V8a4 4 0 0 1 7.4-2.1"/></svg></span>
              <span>解锁次数</span>
              <strong>18次</strong>
            </article>
            <article class="hero-stat-card">
              <span class="stat-icon chat"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.5 10.5h.01M13 10.5h.01"/><path d="M4 11.4c0-3.4 3.2-6.2 7.2-6.2s7.2 2.8 7.2 6.2-3.2 6.2-7.2 6.2c-.9 0-1.8-.1-2.6-.4L5 18.5l1.1-2.8A5.6 5.6 0 0 1 4 11.4Z"/></svg></span>
              <span>最近使用</span>
              <strong>微信</strong>
            </article>
          </div>
        </section>

        <section class="device-card" data-od-id="device-status-card">
          <div class="card-head">
            <div class="device-copy"><p class="child-name">繁大师的手机</p><p class="device-name"><span class="online-dot"></span>在线 · 运行正常 · 最近同步 1 分钟前</p></div>
            <span class="badge">使用中</span>
          </div>
          <div class="device-metrics">
            <div class="metric-soft device-progress-card">
              <p class="metric-label">剩余可用</p>
              <p class="metric-value">1h 25m</p>
              <div class="home-progress" aria-hidden="true"><i></i></div>
            </div>
          </div>
        </section>

        <section class="section" data-od-id="quick-actions" aria-label="快捷操作">
          <div class="quick-grid">
            <button class="quick-card" data-open-blocked-ranges><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><strong>今日禁止时段</strong><span>设置今天不能使用手机的时间</span></button>
            <button class="quick-card"><svg class="icon" viewBox="0 0 24 24"><rect x="6" y="10" width="12" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg><strong>一键锁定设备</strong><span>适合睡前或用餐</span></button>
          </div>
        </section>
      </section>
    </div>

    <div class="settings-drawer" aria-hidden="true" data-settings-drawer>
      <div class="settings-scrim" data-close-settings></div>
      <aside class="settings-panel" role="dialog" aria-modal="true" aria-label="首页设置">
        <header class="settings-panel-head">
          <button class="icon-btn compact" type="button" aria-label="关闭设置" data-close-settings>
            <svg class="icon" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <div>
            <p class="settings-kicker">首页偏好</p>
            <h2>设置</h2>
          </div>
        </header>
        <div class="settings-panel-body">
          <section class="setting-group">
            <h3>提醒</h3>
            <button class="settings-row" type="button" data-action="toggle-reminder">
              <span><strong>重要提醒</strong><small data-reminder-label>已开启提醒</small></span>
              <span class="switch on" aria-label="已开启" role="switch" aria-checked="true"></span>
            </button>
            <button class="settings-row" type="button" data-setting-toggle>
              <span><strong>安静时段</strong><small>22:00 - 07:00 只保留紧急提醒</small></span>
              <span class="switch on" aria-label="已开启" role="switch" aria-checked="true"></span>
            </button>
          </section>
          <section class="setting-group">
            <h3>首页显示</h3>
            <button class="settings-row" type="button" data-setting-toggle>
              <span><strong>优先显示待审批</strong><small>有新请求时置顶显示</small></span>
              <span class="switch on" aria-label="已开启" role="switch" aria-checked="true"></span>
            </button>
            <button class="settings-row" type="button" data-setting-toggle>
              <span><strong>设备同步提示</strong><small>超过 10 分钟未同步时提醒</small></span>
              <span class="switch on" aria-label="已开启" role="switch" aria-checked="true"></span>
            </button>
          </section>
          <section class="setting-group">
            <h3>家长端安全</h3>
            <button class="settings-row" type="button" data-action="toggle-parent-confirm">
              <span><strong>操作前确认</strong><small>锁定设备、延长时间前输入二次确认密码</small></span>
              <span class="switch on" aria-label="已开启" role="switch" aria-checked="true"></span>
            </button>
            <button class="settings-row password-row" type="button" data-action="set-confirm-password">
              <span><strong data-password-title>设置二次确认密码</strong><small data-password-hint>用于高风险操作前验证家长身份</small></span>
              <svg class="icon row-chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
            </button>
          </section>
          <section class="setting-group">
            <h3>主题颜色</h3>
            <div class="theme-grid" role="list" aria-label="主题颜色">
              <button class="theme-option active" type="button" data-theme="blue" aria-pressed="true">
                <span class="theme-swatch blue"></span>
                <span><strong>柔和蓝</strong><small>清晰、可靠</small></span>
              </button>
              <button class="theme-option" type="button" data-theme="green" aria-pressed="false">
                <span class="theme-swatch green"></span>
                <span><strong>守护绿</strong><small>温和、安心</small></span>
              </button>
              <button class="theme-option" type="button" data-theme="warm" aria-pressed="false">
                <span class="theme-swatch warm"></span>
                <span><strong>暖米色</strong><small>亲和、轻松</small></span>
              </button>
              <button class="theme-option" type="button" data-theme="slate" aria-pressed="false">
                <span class="theme-swatch slate"></span>
                <span><strong>高级灰</strong><small>克制、成熟</small></span>
              </button>
            </div>
          </section>
        </div>
      </aside>
    </div>

    <nav class="nav" aria-label="底部导航">
      <a class="nav-item active" href="/" data-target="home"><svg class="icon" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg><span>首页</span></a>
      <a class="nav-item" href="/requests" data-target="approval"><svg class="icon" viewBox="0 0 24 24"><path d="M9 11l2 2 4-4"/><rect x="4" y="4" width="16" height="16" rx="4"/></svg><span>审批</span></a>
      <a class="nav-item" href="/rules" data-target="rules"><svg class="icon" viewBox="0 0 24 24"><path d="M12 3 5 6v5c0 4.5 3 8 7 10 4-2 7-5.5 7-10V6l-7-3Z"/><path d="M9 12h6"/></svg><span>规则</span></a>
      <a class="nav-item" href="/report" data-target="report"><svg class="icon" viewBox="0 0 24 24"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16v-5"/><path d="M12 16V8"/><path d="M16 16v-3"/></svg><span>报告</span></a>
      <a class="nav-item" href="/me" data-target="profile"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span>我的</span></a>
    </nav>
  </main>
  <script src="app-interactions.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
